<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

</head>
<body>

<div class="form">
  <h2 class="form__title">Contact Us</h2>
  <form class="form__form" action="#" method="post">
    <label class="form__label" for="name">Name</label>
    <input class="form_input" type="text" id="name" name="name" placeholder="Your name..">

    <label class="form__label" for="email">Email</label>
    <input class="form_input" type="text" id="email" name="email" placeholder="Your email..">

    <label class="form__label" for="message">Message</label>
    <textarea class="form__textarea" id="message" name="message" placeholder="Write something.." style="height:200px"></textarea>

    <input class="form_submit" type="submit" value="Submit">
  </form>
</div>

</body>
</html>
